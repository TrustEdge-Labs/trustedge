name: 'TrustEdge SBOM Attestation'
description: 'Attest a binary artifact with its CycloneDX SBOM using TrustEdge'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  binary:
    description: 'Path to the binary artifact to attest'
    required: true
  sbom:
    description: 'Path to CycloneDX JSON SBOM file'
    required: true
  key:
    description: 'Path to Ed25519 device key (generates ephemeral if not provided)'
    required: false
    default: ''
  trst-version:
    description: 'TrustEdge release version to download (e.g., v4.0.0)'
    required: false
    default: 'latest'

outputs:
  attestation-path:
    description: 'Path to generated .se-attestation.json file'
    value: ${{ steps.attest.outputs.attestation-path }}

runs:
  using: composite
  steps:
    - name: Download trst binary
      shell: bash
      run: |
        VERSION="${{ inputs.trst-version }}"
        if [ "$VERSION" = "latest" ]; then
          BASE_URL="https://github.com/TrustEdge-Labs/trustedge/releases/latest/download"
        else
          BASE_URL="https://github.com/TrustEdge-Labs/trustedge/releases/download/${VERSION}"
        fi

        # Download binary
        curl -fsSL "${BASE_URL}/trst" -o "${{ runner.temp }}/trst"
        chmod +x "${{ runner.temp }}/trst"

        # Download and verify SHA256 checksum (per D-04: graceful degradation if not present)
        if curl -fsSL "${BASE_URL}/trst.sha256" -o "${{ runner.temp }}/trst.sha256" 2>/dev/null; then
          # The checksum file contains "HASH  filename" — extract just the hash
          EXPECTED_HASH=$(awk '{print $1}' "${{ runner.temp }}/trst.sha256")
          ACTUAL_HASH=$(sha256sum "${{ runner.temp }}/trst" | awk '{print $1}')
          if [ "$EXPECTED_HASH" != "$ACTUAL_HASH" ]; then
            echo "SHA256 mismatch: expected $EXPECTED_HASH, got $ACTUAL_HASH"
            exit 1
          fi
          echo "SHA256 verified: $ACTUAL_HASH"
        else
          echo "Warning: No SHA256 checksum file found for this release. Skipping verification."
        fi

    - name: Generate ephemeral keypair (if no key provided)
      shell: bash
      if: inputs.key == ''
      run: |
        "${{ runner.temp }}/trst" keygen \
          --out-key "${{ runner.temp }}/ephemeral.key" \
          --out-pub "${{ runner.temp }}/ephemeral.pub" \
          --unencrypted
        echo "TRST_KEY=${{ runner.temp }}/ephemeral.key" >> "$GITHUB_ENV"
        echo "TRST_PUB=${{ runner.temp }}/ephemeral.pub" >> "$GITHUB_ENV"

    - name: Set provided key paths
      shell: bash
      if: inputs.key != ''
      run: |
        echo "TRST_KEY=${{ inputs.key }}" >> "$GITHUB_ENV"
        PUB_PATH="${{ inputs.key }}"
        PUB_PATH="${PUB_PATH%.key}.pub"
        echo "TRST_PUB=${PUB_PATH}" >> "$GITHUB_ENV"

    - name: Create SBOM attestation
      id: attest
      shell: bash
      run: |
        BINARY_NAME=$(basename "${{ inputs.binary }}")
        OUT_PATH="${{ runner.temp }}/${BINARY_NAME}.se-attestation.json"
        "${{ runner.temp }}/trst" attest-sbom \
          --binary "${{ inputs.binary }}" \
          --sbom "${{ inputs.sbom }}" \
          --device-key "$TRST_KEY" \
          --device-pub "$TRST_PUB" \
          --out "$OUT_PATH" \
          --unencrypted
        echo "attestation-path=$OUT_PATH" >> "$GITHUB_OUTPUT"
        echo "Created attestation: $OUT_PATH"
