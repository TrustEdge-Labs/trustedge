<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrustEdge Attestation Verifier</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f9fafb;
      color: #111827;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .container {
      max-width: 680px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 0.25rem;
    }
    .subtitle {
      font-size: 0.9rem;
      color: #6b7280;
      margin-bottom: 2rem;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }
    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.5rem;
    }
    input[type="file"] {
      display: block;
      width: 100%;
      font-size: 0.875rem;
      color: #374151;
      padding: 0.5rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #f9fafb;
      cursor: pointer;
    }
    input[type="file"]:focus { outline: 2px solid #6366f1; outline-offset: 2px; }
    button {
      margin-top: 1rem;
      width: 100%;
      padding: 0.625rem 1rem;
      background: #111827;
      color: #fff;
      font-size: 0.875rem;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: #1f2937; }
    button:disabled { background: #9ca3af; cursor: not-allowed; }
    #result { display: none; }
    .status-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1.25rem;
    }
    .status-verified { color: #22c55e; }
    .status-failed, .status-error { color: #ef4444; }
    .field { margin-bottom: 0.875rem; }
    .field-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
    }
    .field-value {
      font-family: monospace;
      font-size: 0.8rem;
      color: #111827;
      word-break: break-all;
      background: #f3f4f6;
      padding: 0.375rem 0.5rem;
      border-radius: 4px;
    }
    .field-value-plain {
      font-size: 0.875rem;
      color: #374151;
    }
    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid #e5e7eb;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 0.75rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading { display: none; text-align: center; padding: 1rem 0; }
    #loading p { font-size: 0.875rem; color: #6b7280; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>TrustEdge Attestation Verifier</h1>
    <p class="subtitle">Verify the authenticity of a <code>.te-attestation.json</code> file.</p>

    <div class="card">
      <label for="file-input">Select .te-attestation.json</label>
      <input type="file" id="file-input" accept=".json,application/json" />
      <button id="verify-btn" disabled>Verify</button>
    </div>

    <div class="card" id="loading">
      <div class="spinner" id="spinner"></div>
      <p>Verifying attestation&hellip;</p>
    </div>

    <div class="card" id="result">
      <div class="status-row" id="status-row"></div>
      <div id="details"></div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('file-input');
    const verifyBtn = document.getElementById('verify-btn');
    const resultCard = document.getElementById('result');
    const loadingCard = document.getElementById('loading');
    const spinnerEl = document.getElementById('spinner');
    const statusRow = document.getElementById('status-row');
    const detailsEl = document.getElementById('details');

    fileInput.addEventListener('change', () => {
      verifyBtn.disabled = !fileInput.files || fileInput.files.length === 0;
    });

    function fieldHtml(label, value, mono) {
      const cls = mono ? 'field-value' : 'field-value field-value-plain';
      return `<div class="field">
        <div class="field-label">${label}</div>
        <div class="${cls}">${escapeHtml(value)}</div>
      </div>`;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function showResult(statusClass, icon, title, fieldsHtml) {
      loadingCard.style.display = 'none';
      resultCard.style.display = 'block';
      statusRow.className = 'status-row ' + statusClass;
      statusRow.innerHTML = `<span>${icon}</span><span>${escapeHtml(title)}</span>`;
      detailsEl.innerHTML = fieldsHtml;
    }

    function showError(message) {
      showResult('status-error', '✖', 'Error', fieldHtml('Message', message, false));
    }

    verifyBtn.addEventListener('click', async () => {
      const file = fileInput.files[0];
      if (!file) return;

      resultCard.style.display = 'none';
      loadingCard.style.display = 'block';
      spinnerEl.style.display = 'block';
      verifyBtn.disabled = true;

      let fileText;
      try {
        fileText = await file.text();
      } catch (err) {
        showError('Failed to read file: ' + err.message);
        verifyBtn.disabled = false;
        return;
      }

      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 30000);

      let response;
      try {
        response = await fetch('/v1/verify-attestation', {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: fileText,
          signal: controller.signal,
        });
      } catch (err) {
        clearTimeout(timeoutId);
        if (err.name === 'AbortError') {
          showError('Request timed out. The server did not respond within 30 seconds.');
        } else {
          showError('Server unavailable, please try again later.');
        }
        verifyBtn.disabled = false;
        return;
      }
      clearTimeout(timeoutId);

      if (response.status === 429) {
        showError('Rate limited \u2014 please wait and try again.');
        verifyBtn.disabled = false;
        return;
      }
      if (response.status === 413) {
        showError('File too large (max 2 MB).');
        verifyBtn.disabled = false;
        return;
      }

      let body;
      try {
        body = await response.json();
      } catch (err) {
        showError('Unexpected response from server (not valid JSON).');
        verifyBtn.disabled = false;
        return;
      }

      if (!response.ok) {
        const msg = body && body.error
          ? body.error + (body.message ? ': ' + body.message : '')
          : 'Verification request failed (HTTP ' + response.status + ')';
        showError(msg);
        verifyBtn.disabled = false;
        return;
      }

      // Parse the original attestation JSON client-side for richer display
      let attest = null;
      try { attest = JSON.parse(fileText); } catch (_) { /* ok */ }

      if (body.status === 'verified') {
        const d = body.details || {};
        let fields = '';
        fields += fieldHtml('Subject (binary) BLAKE3 Hash', d.subject_hash || '—', true);

        // Evidence (SBOM) from attestation body if available
        if (attest && attest.evidence) {
          const ev = attest.evidence;
          fields += fieldHtml('Evidence Label', ev.label || '—', false);
          fields += fieldHtml('Evidence BLAKE3 Hash', ev.hash || d.evidence_hash || '—', true);
          if (ev.size_bytes != null) {
            fields += fieldHtml('Evidence Size', ev.size_bytes.toLocaleString() + ' bytes', false);
          }
        } else if (d.evidence_hash) {
          fields += fieldHtml('Evidence BLAKE3 Hash', d.evidence_hash, true);
        }

        fields += fieldHtml('Signing Public Key', d.public_key || '—', true);
        fields += fieldHtml('Timestamp', d.timestamp || '—', false);
        fields += fieldHtml('Format Version', d.format || '—', false);

        showResult('status-verified', '✔', 'Verified', fields);
      } else {
        const d = body.details || {};
        let fields = '';
        fields += fieldHtml('Reason', d.reason || 'Signature verification failed', false);
        if (d.public_key) fields += fieldHtml('Signing Public Key', d.public_key, true);
        if (d.timestamp) fields += fieldHtml('Timestamp', d.timestamp, false);
        showResult('status-failed', '✖', 'Verification Failed', fields);
      }

      verifyBtn.disabled = false;
    });
  </script>
</body>
</html>
