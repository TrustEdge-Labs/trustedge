# cargo-audit configuration for TrustEdge
#
# This file documents security advisories that cannot be immediately fixed
# due to upstream dependency constraints or lack of patched versions.
#
# Each ignored advisory must have:
# 1. Advisory ID and affected crate
# 2. Severity level
# 3. Why it cannot be fixed
# 4. Risk acceptance rationale
# 5. Mitigation strategy (if applicable)

[advisories]
# Ignore advisories that have no fix available or are transitive dependencies
# from third-party crates we cannot control.

ignore = [
    # RUSTSEC-2023-0071: RSA Marvin Attack (timing side-channel in rsa crate)
    # Severity: Medium
    # Status: MITIGATED — TrustEdge uses OAEP-SHA256 exclusively (v2.2 Phase 45).
    # PKCS#1 v1.5 padding was eliminated. The advisory flags the crate-level timing
    # behavior which affects all padding modes, but OAEP is resistant to the practical
    # attack vector (chosen-ciphertext padding oracle). The rsa crate has no patched
    # version available. Two instances: direct dep + yubikey transitive dep.
    # Re-accepted: v2.2 after Phase 45 OAEP migration (was previously accepted v1.3-v2.1).
    "RUSTSEC-2023-0071",
]
