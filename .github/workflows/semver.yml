#
# API compatibility check — runs weekly and on-demand.
# Separated from CI because it rebuilds with ALL features (~30 min).

name: Semver Check
permissions:
  contents: read

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 6am UTC
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  semver:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # Full history for baseline comparison
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@1d6f37b1831936b8fe2d9feeea23d1da7f387001 # cargo-semver-checks

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev libasound2-dev

      - name: API compatibility (trustedge-core)
        run: cargo semver-checks --package trustedge-core --baseline-rev HEAD~1
